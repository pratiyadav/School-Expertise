services:
  client:
    build: ./client
    ports:
      - "80:80"
    networks:
      - SchoolExpertice-net
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    networks:
      - SchoolExpertice-net
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - SchoolExpertice-data:/data/db
    networks:
      - SchoolExpertice-net
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
    depends_on:
      - mongo
    networks:
      - SchoolExpertice-net
    restart: unless-stopped

networks:
  SchoolExpertice-net:
    driver: bridge

volumes:
  SchoolExpertice-data:
    driver: local